<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Azar Family Admin</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            950: '#0a0e1a',
                            900: '#0f1525',
                            850: '#131b2e',
                            800: '#1a2340',
                        },
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                    }
                }
            }
        }
    </script>
    
    <style>
        .neon-text {
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.5), 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3), inset 0 0 15px rgba(34, 197, 94, 0.1);
        }
        .neon-input:focus {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background effects -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-600/15 rounded-full blur-[180px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-500/10 rounded-full blur-[150px]"></div>
    </div>
    
    <div class="w-full max-w-md relative z-10">
        <div class="bg-slate-900/70 backdrop-blur-xl rounded-2xl shadow-2xl p-8 border border-primary-500/20 neon-border">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-primary-500 via-primary-400 to-primary-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-500/40 neon-border">
                    <i class="fas fa-shield-halved text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-white neon-text">Azar Family</h1>
                <p class="text-primary-400 mt-2 text-sm uppercase tracking-widest font-semibold">Admin Control Panel</p>
            </div>

            {% if error %}
            <div class="bg-rose-500/15 border border-rose-500/30 text-rose-400 px-4 py-3 rounded-xl mb-6">
                {{ error }}
            </div>
            {% endif %}

            <form action="/admin/login" method="post" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-primary-300 mb-2">
                        <i class="fas fa-user mr-2 text-primary-400"></i>Username
                    </label>
                    <input
                        type="text"
                        name="username"
                        required
                        autocomplete="username"
                        class="w-full px-4 py-3 bg-slate-950 border border-primary-500/20 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all duration-200 neon-input"
                        placeholder="Enter username"
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-primary-300 mb-2">
                        <i class="fas fa-lock mr-2 text-primary-400"></i>Password
                    </label>
                    <input
                        type="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        class="w-full px-4 py-3 bg-slate-950 border border-primary-500/20 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all duration-200 neon-input"
                        placeholder="Enter password"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full py-3 px-4 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-medium rounded-xl transition-all duration-200 shadow-lg shadow-primary-900/30 border border-primary-400/20 hover:shadow-[0_0_25px_rgba(34,197,94,0.4)] active:scale-95"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-primary-400/60 text-sm mt-6">
            <i class="fas fa-shield-halved mr-1"></i> Azar Family v1.0
        </p>
    </div>
</body>
</html>
