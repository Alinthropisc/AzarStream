{% extends "base.html" %}

{% block title %}Create Admin - MediaFlow{% endblock %}
{% block header %}Create Admin User{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <form method="post" action="/admin/admins/create" class="card space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Username *</label>
            <input type="text" name="username" required minlength="3" maxlength="64"
                   class="input-field" placeholder="admin_username">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
            <input type="email" name="email"
                   class="input-field" placeholder="admin@example.com">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Name</label>
            <input type="text" name="name"
                   class="input-field" placeholder="John Doe">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Password *</label>
            <input type="password" name="password" required minlength="8"
                   class="input-field" placeholder="••••••••">
            <p class="text-xs text-slate-500 mt-1">Minimum 8 characters</p>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Role</label>
            <select name="role" class="input-field">
                <option value="admin">Admin</option>
                <option value="moderator">Moderator</option>
            </select>
        </div>

        <div class="flex items-center justify-end space-x-3 pt-4 border-t border-white/5">
            <a href="/admin/admins" class="btn-secondary">
                <i class="fas fa-times mr-2"></i>
                Cancel
            </a>
            <button type="submit" class="btn-primary">
                <i class="fas fa-plus mr-2"></i>
                Create Admin
            </button>
        </div>
    </form>
</div>
{% endblock %}
